    <style>
        :root { --primary: #7098e2; --bg: #f4f7f6; --dark: #2c3e50; --warning: #e67e22; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 40px; }
        
        .navbar { background: var(--primary); padding: 15px; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }

        .header-title { text-align: center; color: var(--dark); margin-bottom: 20px; }
        .header-title h2 { margin: 0; font-size: 22px; }
        .header-title p { margin: 5px 0 0; color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        .filter-section { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .filter-section .filter-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        .filter-section .filter-group label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: white; outline: none; }

        .switch-group { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: bold; color: var(--dark); cursor: pointer; padding: 5px 0; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-bottom: 4px solid var(--primary); }
        .stat-card h2 { margin: 0; font-size: 18px; color: var(--dark); }
        .stat-card p { margin: 5px 0 0; color: #777; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .cost-text { color: var(--warning) !important; }

        .report-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; display: flex; gap: 12px; align-items: center; }
        
        .card-img-area { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mobile-p-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; cursor: pointer; }
        .mobile-no-img { width: 50px; height: 50px; background: #f1f5f9; color: #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .item-info { flex-grow: 1; }
        .item-info strong { display: block; font-size: 14px; color: var(--dark); text-transform: uppercase; }
        .item-info span { font-size: 11px; color: #888; display: block; margin-top: 3px; line-height: 1.3; }
        
        .item-values { text-align: right; flex-shrink: 0; }
        .val-qty { display: block; font-weight: bold; font-size: 15px; color: var(--primary); }
        .val-total { display: block; font-size: 12px; color: var(--warning); font-weight: bold; margin-top: 2px; }
        .model-tag { background: #f0f4ff; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 3px; }
        .spec-tag { color: #4f46e5; font-weight: bold; background: #eef2ff; padding: 1px 5px; border-radius: 4px; font-size: 11px; }

        .mobile-modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .mobile-modal-content { max-width: 95%; max-height: 80%; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .mobile-modal-close { position: absolute; top: 20px; right: 25px; color: white; font-size: 35px; font-weight: bold; cursor: pointer; }
    </style>
</head>

        onAuthStateChanged(auth, (user) => { if (user) { updateFiltersAndReport(); } else { window.location.href = "login.html"; } });

        // Kategori tetiklendiğinde markaları canlı süzer
        document.getElementById('typeFilter').onchange = () => { updateFiltersAndReport(); };

        function updateFiltersAndReport() {
            onValue(ref(db, 'products'), (snap) => {
                allProducts = [];
                const brands = new Set();
                const currentTypeSelection = document.getElementById('typeFilter').value;

                snap.forEach(child => {
                    const p = child.val();
                    let pType = p.product_type || "Bisiklet"; // Senin akıllı mantığın: Yoksa bisiklet say
                    
                    if (pType === currentTypeSelection) {
                        allProducts.push(p);
                        if(p.brand) brands.add(p.brand);
                    }
                });

                const brandFilter = document.getElementById('brandFilter');
                brandFilter.innerHTML = '<option value="all">Tüm Markalar</option>';
                [...brands].sort().forEach(b => { brandFilter.innerHTML += `<option value="${b}">${b}</option>`; });
                
                calculateReport();
            });
        }

        function calculateReport() {
            const selectedType = document.getElementById('typeFilter').value;
            const selectedBrand = document.getElementById('brandFilter').value;
            const selectedModel = document.getElementById('modelFilter').value;
            const onlyInStock = document.getElementById('onlyInStock').checked;
            const reportList = document.getElementById('reportList');
            
            let tQty = 0; let tCost = 0; reportList.innerHTML = "";

            let filtered = allProducts.filter(p => {
                const brandMatch = (selectedBrand === 'all' || p.brand === selectedBrand);
                const modelMatch = (selectedModel === 'all' || p.model === selectedModel);
                const stockMatch = onlyInStock ? (parseInt(p.stock) > 0) : true;
                return brandMatch && modelMatch && stockMatch;
            });

            filtered.forEach(p => {
                const qty = parseInt(p.stock) || 0;
                const buyPrice = parseFloat(p.buy_price) || 0;
                const total = qty * buyPrice;
                tQty += qty; tCost += total;

                const bulunanResim = renkKatalogu[p.color];
                const imgHtml = bulunanResim ? `<img src="${bulunanResim}" class="mobile-p-img" onclick="window.openMobileImage('${bulunanResim}')">` : `<div class="mobile-no-img"><i class="far fa-image"></i></div>`;

                // Varyant Çizgi Sihirbazı (Kategoriye göre teknik özellikleri alt alta dizer)
                let variantDetails = "";
                if(selectedType === "Bisiklet") {
                    variantDetails = `Kadro: <span class="spec-tag">${p.frame || '-'}</span> | ${p.color || '-'} | ${p.wheel || '-'}"`;
                } else if(selectedType === "Akülü") {
                    variantDetails = `Güç: <span class="spec-tag">${p.volt || '12V'}</span> | Renk: ${p.color || '-'}`;
                } else if(selectedType === "Scooter") {
                    variantDetails = `Yaş: <span class="spec-tag">${p.ageGroup || '3+'}</span> | Fren: ${p.brakeType || '-'} | Renk: ${p.color || '-'}`;
                } else {
                    variantDetails = `Renk / Varyant: ${p.color || '-'}`;
                }

                reportList.innerHTML += `
                    <div class="report-card">
                        <div class="card-img-area">${imgHtml}</div>
                        <div class="item-info">
                            <strong>${p.brand} <span class="model-tag">${p.model}</span></strong>
                            <span>${variantDetails}</span>
                        </div>
                        <div class="item-values">
                            <span class="val-qty">${qty} Adet</span>
                            <span class="val-total">${total.toLocaleString('tr-TR')} ₺</span>
                        </div>
                    </div>`;
            });

            document.getElementById('totalQty').innerText = tQty;
            document.getElementById('totalCost').innerText = tCost.toLocaleString('tr-TR') + " ₺";
        }

        window.openMobileImage = (url) => { document.getElementById('mobileModalImg').src = url; document.getElementById('mobileImageModal').style.display = 'flex'; };

        document.getElementById('brandFilter').onchange = (e) => {
            const brand = e.target.value;
            const modelFilter = document.getElementById('modelFilter');
            modelFilter.innerHTML = '<option value="all">Tüm Modeller</option>';
            if (brand === 'all') { modelFilter.disabled = true; } else {
                modelFilter.disabled = false;
                const models = new Set();
                allProducts.filter(p => p.brand === brand).forEach(p => { if(p.model) models.add(p.model); });
                [...models].sort().forEach(m => { modelFilter.innerHTML += `<option value="${m}">${m}</option>`; });
            }
            calculateReport();
        };
        document.getElementById('modelFilter').onchange = calculateReport;
        document.getElementById('onlyInStock').onchange = calculateReport;
    </script>
</body>
</html>
