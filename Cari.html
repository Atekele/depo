<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cari Yönetimi | Yeni Ankara Motor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #7098e2; --bg: #f4f7f6; --dark: #2c3e50; --success: #27ae60; --danger: #c0392b; --warning: #e67e22; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 40px; }
        .navbar { background: var(--primary); padding: 15px; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .form-section { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .form-title { font-size: 14px; font-weight: bold; color: var(--dark); margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: white; outline: none; box-sizing: border-box; width: 100%; }
        .btn { width: 100%; padding: 14px; background: var(--success); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .cari-wrapper { background: white; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; overflow: hidden; }
        .cari-wrapper.cari-status-0 { background: #fee2e2; border-color: #fca5a5; opacity: 0.85; }
        .cari-wrapper.cari-status-0 .cari-info strong { text-decoration: line-through; color: #7f8c8d; }
        .cari-card { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .cari-info strong { display: block; font-size: 15px; color: var(--dark); text-transform: uppercase; }
        .cari-info span { font-size: 12px; color: #888; display: block; margin-top: 2px; }
        .cari-bakiye-row { display: flex; align-items: center; gap: 10px; }
        .cari-bakiye { text-align: right; font-weight: bold; font-size: 15px; }
        .borc { color: var(--danger); }
        .alacak { color: var(--success); }
        .sifir { color: #7f8c8d; }
        .cari-history { display: none; background: #f8fafc; border-top: 1px dashed #e2e8f0; padding: 15px; }
        .history-title { font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 8px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .history-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #edf2f7; }
        .history-item.status-0 { text-decoration: line-through; opacity: 0.5; background: #ffe4e6; padding: 4px; border-radius: 6px; }
        .history-date { font-size: 11px; color: #a0aec0; }
        .history-note-text { display: block; font-size: 12px; color: #475569; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; margin-top: 4px; border-left: 3px solid #cbd5e1; font-style: italic; width: fit-content; max-width: 250px; }
        .btn-void { color: var(--danger); background: none; border: none; font-size: 12px; cursor: pointer; padding: 3px; font-weight: bold; }
        .btn-edit { color: var(--primary); background: none; border: none; font-size: 12px; cursor: pointer; padding: 3px; font-weight: bold; margin-left: 5px; }
        .btn-reactive { color: var(--success); background: none; border: none; font-size: 12px; cursor: pointer; padding: 3px; font-weight: bold; }
        .btn-excel { background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .cari-edit-btn { color: #7098e2; border: none; background: none; font-size: 15px; cursor: pointer; padding: 8px; }
        .cari-del-btn { color: #a0aec0; border: none; background: none; font-size: 16px; cursor: pointer; padding: 8px; }
        .cari-reactive-btn { color: var(--success); border: none; background: none; font-size: 16px; cursor: pointer; padding: 8px; }
        .filter-panel { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; background: white; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .switch-group-filter { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; color: #475569; cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">PANEL</a>
        <a href="ProductUpdate.html">LİSTE</a>
        <a href="Islem.html">İŞLEM YAP</a>
        <a href="Islemler.html">GEÇMİŞ</a>
    </div>

    <div class="container">
        <div class="header-title"><h2>YENİ ANKARA MOTOR</h2><p>Cari Hesap Takip</p></div>
        <div class="form-section">
            <div class="form-title"><i class="fas fa-user-plus"></i> Yeni Cari Kart Oluştur</div>
            <form id="cariForm">
                <div class="form-group"><input type="text" id="cariName" placeholder="Müşteri / Toptancı Adı" required></div>
                <div class="form-group"><input type="tel" id="cariPhone" placeholder="Telefon Numarası"></div>
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <input type="number" id="cariBalance" value="0" style="flex:1;">
                    <select id="balanceType" style="flex:1;"><option value="sifir">Bakiyesi Yok</option><option value="borclu">Borcu Var</option><option value="alacakli">Alacağı Var</option></select>
                </div>
                <button type="submit" class="btn">CARİ KARTI KAYDET</button>
            </form>
        </div>

        <input type="text" id="cariSearch" placeholder="Cari ara...">
        <div class="filter-panel">
            <label class="switch-group-filter"><input type="checkbox" id="showDeletedCarisCheck" onchange="window.triggerLiveFilter()"> Silinen Cari Kartları Göster</label>
            <label class="switch-group-filter"><input type="checkbox" id="showVoidedTransactionsCheck" onchange="window.triggerLiveFilter()"> İptal Edilen İşlemleri Göster</label>
        </div>
        <div id="cariList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBSCuSjLtRxCicBpiYE4zV_CQ6iF23CMos", authDomain: "ceit133-mses.firebaseapp.com", databaseURL: "https://ceit133-mses-default-rtdb.firebaseio.com", projectId: "ceit133-mses", appId: "1:803859950218:web:48b897035bb041d1799b73" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app);

        let allCaris = []; let allTransactions = []; let openCardKey = null;
        onAuthStateChanged(auth, user => { if (user) fetchCariAndTransactions(); else window.location.href = "login.html"; });
        window.triggerLiveFilter = () => { renderCaris(); };

        function fetchCariAndTransactions() {
            onValue(ref(db, 'deleted_products'), (tSnap) => {
                allTransactions = [];
                if(tSnap.exists()){ tSnap.forEach(child => { const val = child.val(); val.key = child.key; if(val.cariKey) allTransactions.push(val); }); }
                onValue(ref(db, 'customers'), (cSnap) => {
                    allCaris = []; if(cSnap.exists()){ cSnap.forEach(child => { const c = child.val(); c.key = child.key; allCaris.push(c); }); }
                    renderCaris();
                });
            });
        }

        function renderCaris() {
            const searchVal = document.getElementById('cariSearch').value.toLowerCase();
            const showDeletedCaris = document.getElementById('showDeletedCarisCheck').checked;
            const showVoidedTransactions = document.getElementById('showVoidedTransactionsCheck').checked;
            const cariList = document.getElementById('cariList'); cariList.innerHTML = "";

            let filtered = allCaris.filter(c => (c.name || "").toLowerCase().includes(searchVal));
            if (!showDeletedCaris) { filtered = filtered.filter(c => c.status !== 0); }
            filtered.sort((a, b) => (a.name || "").localeCompare(b.name || "tr"));

            filtered.forEach(c => {
                const bakiye = parseFloat(c.balance) || 0;
                let bakiyeClass = bakiye > 0 ? "borc" : (bakiye < 0 ? "alacak" : "sifir");
                let bakiyeText = bakiye === 0 ? "0,00 ₺" : `${Math.abs(bakiye).toLocaleString('tr-TR')} ₺ ` + (bakiye > 0 ? "(Borç)" : "(Alacak)");
                let isCariDeleted = c.status === 0;

                let MyTransactions = allTransactions.filter(t => t.cariKey === c.key);
                if (!showVoidedTransactions) MyTransactions = MyTransactions.filter(t => t.status !== 0); 
                MyTransactions.sort((a,b) => b.date - a.date);

                let historyHtml = "";
                if(MyTransactions.length === 0) { historyHtml = `<div class="no-history">İşlem yok.</div>`; } else {
                    MyTransactions.forEach(t => {
                        let d = new Date(t.date); let dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
                        let isVoided = t.status === 0;
                        let actionBtnHtml = !isVoided ? `<button class="btn-void" onclick="window.voidTransaction('${t.key}', '${c.key}', event)"><i class="fas fa-ban"></i> İptal</button><button class="btn-edit" onclick="window.editTransaction('${t.key}', '${c.key}', event)"><i class="fas fa-edit"></i> Düzelt</button>` : `<button class="btn-reactive" onclick="window.reactiveTransaction('${t.key}', '${c.key}', event)"><i class="fas fa-check-circle"></i> Geri Al</button>`;
                        let noteHtml = (t.description && t.description !== "") ? `<span class="history-note-text">${t.description}</span>` : "";

                        historyHtml += `
                            <div class="history-item ${isVoided ? 'status-0' : ''}">
                                <div class="item-text-core">
                                    <b>[${t.type}]</b> ${t.brand || ''} ${t.model || ''}
                                    ${noteHtml}
                                    <div class="history-date">${dateStr}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-weight:bold;">${parseFloat(t.price || 0).toLocaleString('tr-TR')} ₺</div>
                                    ${actionBtnHtml}
                                </div>
                            </div>`;
                    });
                }
                let controlBtnHtml = !isCariDeleted ? `<button class="cari-edit-btn" onclick="window.editCariName('${c.key}', event)"><i class="fas fa-pen"></i></button><button class="cari-del-btn" onclick="window.deleteCariCard('${c.key}', event)"><i class="fas fa-trash-alt"></i></button>` : `<button class="cari-reactive-btn" onclick="window.reactiveCariCard('${c.key}', event)"><i class="fas fa-history"></i></button>`;
                let dDisplay = (openCardKey === c.key) ? 'block' : 'none';

                cariList.innerHTML += `
                    <div class="cari-wrapper ${isCariDeleted ? 'cari-status-0' : ''}">
                        <div class="cari-card" onclick="window.toggleHistory('${c.key}')">
                            <div class="cari-info"><strong>${c.name} ${isCariDeleted ? '(SİLİNDİ)' : ''}</strong><span><i class="fas fa-phone"></i> ${c.phone || 'Telefon Yok'}</span></div>
                            <div class="cari-bakiye-row"><div class="cari-bakiye ${bakiyeClass}">${bakiyeText}</div>${controlBtnHtml}</div>
                        </div>
                        <div id="history-${c.key}" class="cari-history" style="display:${dDisplay};">
                            <div class="history-title"><span>İşlem Geçmişi</span><button class="btn-excel" onclick="window.exportCariToExcel('${c.key}', '${c.name}', event)"><i class="fas fa-file-excel"></i> Excel</button></div>
                            ${historyHtml}
                        </div>
                    </div>`;
            });
        }

        window.editTransaction = async (txKey, cariKey, event) => {
            event.stopPropagation();
            const tx = allTransactions.find(t => t.key === txKey);
            const cari = allCaris.find(c => c.key === cariKey);
            if(!tx || !cari) return;

            const newPrice = prompt("Yeni tutarı girin (₺):", tx.price);
            const newNote = prompt("Yeni açıklama notunu girin:", tx.description || "");

            if (newPrice === null || isNaN(parseFloat(newPrice))) return;

            try {
                const oldPrice = parseFloat(tx.price);
                const updatedPrice = parseFloat(newPrice);
                let currentBal = parseFloat(cari.balance) || 0;
                let diff = updatedPrice - oldPrice;
                if (tx.type === "Satış") currentBal += diff;
                else if (tx.type === "Alış") currentBal -= diff;
                else if (tx.type === "Tahsilat") currentBal -= diff;
                else if (tx.type === "Ödeme") currentBal += diff;

                await update(ref(db, `deleted_products/${txKey}`), { price: updatedPrice, description: newNote || tx.description });
                await update(ref(db, `customers/${cariKey}`), { balance: currentBal });
                alert("İşlem güncellendi!");
            } catch(e) { alert("Hata: " + e.message); }
        };

        window.exportCariToExcel = (cariKey, cariName, event) => {
            event.stopPropagation();
            let myActiveTx = allTransactions.filter(t => t.cariKey === cariKey && t.status !== 0);
            let excelRows = myActiveTx.map(t => ({ "İşlem Tarihi": t.date, "İşlem Türü": t.type, "Ürün": `${t.brand} ${t.model}`, "Not": t.description, "Tutar (TL)": parseFloat(t.price) }));
            const worksheet = XLSX.utils.json_to_sheet(excelRows); const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Cari Ekstre");
            XLSX.writeFile(workbook, cariName + "_Ekstre.xlsx");
        };

        window.editCariName = async (key, event) => { event.stopPropagation(); const targetCari = allCaris.find(c => c.key === key); if (!targetCari) return; const newName = prompt(`Yeni ismi girin:`, targetCari.name); if (newName === null || newName.trim() === "") return; try { await update(ref(db, `customers/${key}`), { name: newName.trim() }); } catch (err) { alert("Hata: " + err.message); } };
        window.deleteCariCard = async (key, event) => { event.stopPropagation(); if (!confirm(`Kapatılsın mı?`)) return; await update(ref(db, `customers/${key}`), { status: 0 }); };
        window.reactiveCariCard = async (key, event) => { event.stopPropagation(); if (!confirm(`Geri açılsın mı?`)) return; await update(ref(db, `customers/${key}`), { status: 1 }); };
        window.voidTransaction = async (txKey, cariKey, event) => { event.stopPropagation(); if(!confirm("İptal edilsin mi?")) return; await update(ref(db, `deleted_products/${txKey}`), { status: 0 }); };
        window.reactiveTransaction = async (txKey, cariKey, event) => { event.stopPropagation(); if(!confirm("Aktifleştirilsin mi?")) return; await update(ref(db, `deleted_products/${txKey}`), { status: 1 }); };
        window.toggleHistory = (key) => { const el = document.getElementById(`history-${key}`); const isVisible = el.style.display === 'block'; document.querySelectorAll('.cari-history').forEach(h => h.style.display = 'none'); if (isVisible) { el.style.display = 'none'; openCardKey = null; } else { el.style.display = 'block'; openCardKey = key; } };
        document.getElementById('cariSearch').oninput = renderCaris;
        document.getElementById('cariForm').onsubmit = function(e) { e.preventDefault(); const name = document.getElementById('cariName').value.trim(); const phone = document.getElementById('cariPhone').value.trim(); let balance = parseFloat(document.getElementById('cariBalance').value) || 0; const type = document.getElementById('balanceType').value; if (type === 'alacakli') balance = -balance; if (type === 'sifir') balance = 0; push(ref(db, 'customers'), { name, phone, balance, createdAt: Date.now(), status: 1 }); document.getElementById('cariForm').reset(); };
    </script>
</body>
</html>
